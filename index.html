<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista dos Produtos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--CSS -->
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">

        <!-- Cabeçalho -->
        <header class="text-center mb-4">
            <h1>
                <i class="fas fa-box"></i>
                    Categoria dos Produtos
                <i class="fas fa-box"></i>
            </h1>

            <p class="text-muted">
                Hora de procurar os itens para sua obra
            </p>
        </header>

        <!-- Botão para adicionar -->
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#productModal">
            <i class="fas fa-plus"></i>
                Novo Produto
        </button>

        <!-- Busca -->
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Buscar produto...">
        </div>

        <!-- Tabela -->
        <div class="table-responsive">
            <table class="table table-hover table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Imagem</th> 
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th> 
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <!-- Dados serão inseridos via jQuery -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para Adiciona/Editar Produtos -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        Novo Produto
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Formulario -->
                <div class="modal-body">
                    <form id="productForm">

                        <!-- Imagem -->

                        <div>
                            <label for="productImageLink" class="form-label">
                                Imagem:
                            </label>

                            <input type="text" class="form-control" id="productImageLink" placeholder="exemplo.com">

                            <div class="invalid-feedback">
                                Informe um link válido para a imagem
                            </div>
                        </div>

                        <!-- Nome -->
                        <div class="mb-3">
                            <label for="productName" class="form-label">
                                Nome:
                            </label>
            
                            <input type="text" class="form-control" id="productName" placeholder="Nome do Produto" required>

                            <div class="invalid-feedback">
                                Informe o nome do produto
                            </div>
                        </div>

                        <!-- Categoria -->
                        <div class="mb-3">
                            <label for="productCategory" class="form-label">
                                Categoria:
                            </label>

                            <select class="form-select" id="productCategory" required>
                                <option value="">Selecione...</option>
                                <option value="Hidráulico">Hidráulico</option>
                                <option value="Argamassas e Rejuntes">Argamassas e Rejuntes</option>
                                <option value="Elétrica">Elétrica</option>
                                <option value="Pintura">Pintura</option>
                                <option value="Máquinas e Motores">Máquinas e Motores</option>
                                <option value="Cubas e Lavatórios">Cubas e Lavatórios</option>
                            </select>

                            <div class="invalid-feedback">
                                Selecione uma categoria
                            </div>
                        </div>

                        <!-- Descrição -->
                        <div class="mb-3">
                            <label for="productDescription" class="form-label">
                                Descrição:
                            </label>

                            <input type="text" class="form-control" id="productDescription" placeholder="Descrição breve do produto" required>

                            <div class="invalid-feedback">
                                Descreva como é o produto
                            </div>
                        </div>
                        
                        <!-- Preço -->
                        <div class="mb-3">
                            <label for="productPrice" class="form-label">
                                Preço:
                            </label>

                            <input type="number" class="form-control" id="productPrice" step="0.01" min="0" placeholder="0.00" required>

                            <div class="invalid-feedback">
                                Informe um preço válido
                            </div>
                        </div>

                        <!-- Estoque -->
                        <div class="mb-3">
                            <label for="productStock" class="form-label">
                                Estoque:
                            </label>

                            <input type="number" class="form-control" id="productStock" min="0" placeholder="0" required>

                            <div class="invalid-feedback">
                                Informe o estoque
                            </div>
                        </div>

                        <!-- Botões -->
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>

                        <button type="submit" class="btn btn-primary">
                            Salvar
                        </button>
                    </form>
                </div>
           </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Seus scripts -->
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
